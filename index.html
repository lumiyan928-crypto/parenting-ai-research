<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭AI育娃 · 调研资料</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#F7F5F0; --card:#FFFFFF; --text:#1A1814; --text2:#5C5750; --text3:#9B9489; --border:rgba(30,24,16,0.1); --serif:'Noto Serif SC',serif; --sans:'Noto Sans SC',sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .wrap{max-width:480px;width:100%;text-align:center}
  .tag{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
  h1{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:8px;letter-spacing:-0.02em}
  .sub{font-size:13px;color:var(--text2);margin-bottom:36px}
  .cards{display:flex;flex-direction:column;gap:12px}
  a.card{display:flex;align-items:center;gap:16px;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:20px 24px;text-decoration:none;color:var(--text);transition:box-shadow 0.2s,transform 0.15s}
  a.card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);transform:translateY(-2px)}
  .icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .card-title{font-family:var(--serif);font-size:16px;font-weight:700;margin-bottom:2px}
  .card-desc{font-size:12px;color:var(--text2)}
  .arrow{margin-left:auto;color:var(--text3);font-size:18px;flex-shrink:0}
  .footer{margin-top:48px;font-size:11px;color:var(--text3);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="tag">家庭AI育娃 · 用户调研</div>
  <h1>调研资料导航</h1>
  <div class="sub">2026年4月 · 广东深圳 · 19份有效问卷</div>
  <div class="cards">
    <a class="card" href="parenting_survey_report.html">
      <div class="icon" style="background:#EEEDFE;">📊</div>
      <div>
        <div class="card-title">调研分析报告</div>
        <div class="card-desc">4个年龄层深度分析 · 个人画像 · 横向对比</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="card" href="interview_outlines.html">
      <div class="icon" style="background:#E1F5EE;">🎙️</div>
      <div>
        <div class="card-title">访谈大纲 & 展示方案</div>
        <div class="card-desc">赵伟 · 涂海龙 · 赵书影 · allenyu · Demo展示</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="footer">基于问卷数据定制 · 数据更新于2026年4月9日</div>
</div>
</body>
</html>
